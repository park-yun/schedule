<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리의 소중한 만남 🌿 - 일정 조율</title>
    <!-- CSS & Frameworks CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #F2F4F3; 
            -webkit-tap-highlight-color: transparent;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        button {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase Configuration & Initialization ---
        // External browser fallback logic
        let config = {};
        try {
            config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        } catch (e) {
            console.error("Firebase config parse error", e);
        }

        // Initialize Firebase only if config exists
        if (config.apiKey) {
            firebase.initializeApp(config);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'meeting-planner-v2';
        const THEME_COLOR = "#23B5EB";

        const App = () => {
            const [user, setUser] = useState(null);
            const [meetingTitle, setMeetingTitle] = useState('우리의 소중한 만남 🌿');
            const [targetCount, setTargetCount] = useState(3);
            const [baseDate, setBaseDate] = useState(new Date().toISOString().split('T')[0]);
            const [participants, setParticipants] = useState([]);
            const [currentUserName, setCurrentUserName] = useState('');
            const [selectedDates, setSelectedDates] = useState([]);
            const [isJoined, setIsJoined] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);

            // 1. Authentication
            useEffect(() => {
                if (!config.apiKey) {
                    setError("Firebase 설정이 누락되었습니다. Canvas 환경에서 코드를 확인해주세요.");
                    setIsLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) setIsLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Real-time Sync
            useEffect(() => {
                if (!user) return;

                const metaRef = db.doc(`artifacts/${appId}/public/data/settings/meeting`);
                const unsubscribeMeta = metaRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        if (data.title) setMeetingTitle(data.title);
                        if (data.targetCount) setTargetCount(data.targetCount);
                        if (data.baseDate) setBaseDate(data.baseDate);
                    }
                }, (err) => console.error("Meta snapshot error", err));

                const partRef = db.collection(`artifacts/${appId}/public/data/participants`);
                const unsubscribePart = partRef.onSnapshot((snapshot) => {
                    const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setParticipants(list);
                    
                    const me = list.find(p => p.id === user.uid);
                    if (me) {
                        setIsJoined(true);
                        setCurrentUserName(me.name || '');
                        setSelectedDates(me.availableDates || []);
                    } else {
                        setIsJoined(false);
                    }
                }, (err) => console.error("Participants snapshot error", err));

                return () => {
                    unsubscribeMeta();
                    unsubscribePart();
                };
            }, [user]);

            const handleJoin = async () => {
                if (!currentUserName.trim() || selectedDates.length === 0) return;
                await db.doc(`artifacts/${appId}/public/data/participants/${user.uid}`).set({
                    name: currentUserName,
                    availableDates: selectedDates,
                    updatedAt: Date.now()
                });
                setIsJoined(true);
            };

            const toggleDate = async (dateStr) => {
                const newDates = selectedDates.includes(dateStr) 
                    ? selectedDates.filter(d => d !== dateStr) 
                    : [...selectedDates, dateStr];
                
                setSelectedDates(newDates);
                
                if (isJoined && user) {
                    await db.doc(`artifacts/${appId}/public/data/participants/${user.uid}`).update({
                        availableDates: newDates,
                        updatedAt: Date.now()
                    });
                }
            };

            const leaveMeeting = async () => {
                await db.doc(`artifacts/${appId}/public/data/participants/${user.uid}`).delete();
                setIsJoined(false);
                setSelectedDates([]);
                setCurrentUserName('');
            };

            const { calendarDates, todayStr } = useMemo(() => {
                const dates = [];
                const [y, m, d] = baseDate.split('-').map(Number);
                const base = new Date(y, m - 1, d);
                const start = new Date(base);
                start.setDate(base.getDate() - base.getDay());

                for (let i = 0; i < 35; i++) {
                    const curr = new Date(start);
                    curr.setDate(start.getDate() + i);
                    const yStr = curr.getFullYear();
                    const mStr = String(curr.getMonth() + 1).padStart(2, '0');
                    const dStr = String(curr.getDate()).padStart(2, '0');
                    dates.push(`${yStr}-${mStr}-${dStr}`);
                }
                const now = new Date();
                const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                return { calendarDates: dates, todayStr: today };
            }, [baseDate]);

            const dateCounts = useMemo(() => {
                const c = {};
                participants.forEach(p => {
                    (p.availableDates || []).forEach(d => {
                        c[d] = (c[d] || 0) + 1;
                    });
                });
                return c;
            }, [participants]);

            if (error) return <div className="min-h-screen flex items-center justify-center p-8 text-center text-red-500">{error}</div>;
            if (isLoading || !user) return <div className="min-h-screen flex items-center justify-center text-gray-400 italic">공간 연결 중...</div>;

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-2xl mx-auto space-y-6">
                    <header className="flex justify-between items-center px-2">
                        <div className="flex items-center gap-2" style={{ color: THEME_COLOR }}>
                            <div className="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center border border-gray-200">🌿</div>
                            <span className="text-xs font-black tracking-widest uppercase">Meeting Space</span>
                        </div>
                    </header>

                    <section className="bg-white rounded-3xl p-8 shadow-sm border border-gray-200 text-center space-y-3">
                        <h1 className="text-3xl font-black text-gray-700 tracking-tight">{meetingTitle}</h1>
                        <div className="flex justify-center gap-4 text-[11px] font-bold" style={{ color: THEME_COLOR }}>
                            <span className="bg-blue-50 px-3 py-1 rounded-full">👥 {targetCount}명 목표</span>
                            <span className="bg-blue-50 px-3 py-1 rounded-full">📅 {participants.length}명 응답</span>
                        </div>
                    </section>

                    {!isJoined ? (
                        <div className="bg-white rounded-3xl p-8 border border-gray-200 shadow-sm text-center space-y-4">
                            <h2 className="text-lg font-bold text-gray-700">참여하기</h2>
                            <input 
                                type="text" 
                                placeholder="성함을 입력하세요"
                                value={currentUserName}
                                onChange={e => setCurrentUserName(e.target.value)}
                                className="w-full p-4 rounded-2xl bg-gray-50 border-none text-center text-gray-700 focus:ring-2 focus:ring-[#23B5EB] outline-none"
                            />
                            <button 
                                onClick={handleJoin}
                                disabled={!currentUserName.trim() || selectedDates.length === 0}
                                className="w-full py-4 rounded-2xl font-black text-white shadow-lg transition-transform active:scale-95 disabled:bg-gray-300"
                                style={{ backgroundColor: THEME_COLOR }}
                            >
                                일정 등록 완료 ✨
                            </button>
                        </div>
                    ) : (
                        <div className="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-xl">👤</div>
                                <div>
                                    <div className="font-bold text-gray-700">{currentUserName}님</div>
                                    <div className="text-[10px] text-gray-400">날짜를 클릭하여 수정하세요.</div>
                                </div>
                            </div>
                            <button onClick={leaveMeeting} className="text-red-300 hover:text-red-500 text-sm font-bold p-2">참여 취소</button>
                        </div>
                    )}

                    <section className="bg-white rounded-3xl p-6 shadow-sm border border-gray-200">
                        <div className="calendar-grid">
                            {['일','월','화','수','목','금','토'].map((d, i) => (
                                <div key={d} className={`text-center text-[10px] font-bold mb-3 ${i===0 ? 'text-red-400':'text-gray-400'}`}>{d}</div>
                            ))}
                            {calendarDates.map((dStr) => {
                                const day = dStr.split('-')[2];
                                const isSelected = selectedDates.includes(dStr);
                                const isToday = dStr === todayStr;
                                const count = dateCounts[dStr] || 0;
                                const intensity = count === 0 ? 0 : Math.min(0.1 + (count / targetCount) * 0.9, 1);
                                
                                return (
                                    <button 
                                        key={dStr}
                                        onClick={() => toggleDate(dStr)}
                                        className={`h-14 rounded-xl border-2 flex flex-col items-center justify-center relative transition-all active:scale-90`}
                                        style={{ 
                                            backgroundColor: isSelected ? THEME_COLOR : `rgba(35, 181, 235, ${intensity})`,
                                            borderColor: isSelected ? THEME_COLOR : (isToday ? '#23B5EB33' : 'transparent'),
                                            color: (isSelected || (count > targetCount/2)) ? 'white' : '#4A5751'
                                        }}
                                    >
                                        <span className="text-xs font-black">{parseInt(day)}</span>
                                        {count > 0 && !isSelected && <span className="text-[9px] font-bold mt-0.5 opacity-80">{count}명</span>}
                                    </button>
                                );
                            })}
                        </div>
                    </section>

                    <section className="bg-white rounded-3xl p-6 shadow-sm border border-gray-200">
                        <h3 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2">응답 현황 ({participants.length})</h3>
                        <div className="flex flex-wrap gap-2">
                            {participants.map(p => (
                                <div key={p.id} className="bg-gray-50 border border-gray-100 px-3 py-2 rounded-xl flex items-center gap-2">
                                    <span className="text-xs font-bold text-gray-600">{p.name}</span>
                                    <span className="text-[10px] font-black" style={{ color: THEME_COLOR }}>{p.availableDates?.length || 0}일</span>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
